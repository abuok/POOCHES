<!-- HEADER COMPONENT -->
<header id="hdr">
  <div id="logo">XAU/USD TRADING SYSTEM</div>
  
  <div id="clock-wrap">
    <div id="clk"></div>
    <div id="clkd"></div>
  </div>
  
  <div id="price-wrap">
    <div id="live-price"></div>
    <div id="price-meta">
      <div id="price-chg"></div>
      <div id="feed-dot">●</div>
    </div>
  </div>
  
  <div id="sess-wrap">
    <div id="sess-badge"></div>
    <div id="sess-next"></div>
  </div>
  
  <div id="acct-strip">
    <div class="ah">ACCOUNT</div>
    <div class="av" id="account-balance">$0.00</div>
    <div class="ah">TODAY P&L</div>
    <div class="av" id="daily-pnl">$0.00</div>
    <div class="ah">DAILY STOP</div>
    <div class="av" id="daily-stop">$0.00</div>
    <div class="ah">TRADES</div>
    <div class="av" id="trade-count">0/0</div>
  </div>
  
  <div id="hpill">LIVE</div>
</header>
